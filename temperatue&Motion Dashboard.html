<!DOCTYPE html>
<html>
<head>
  <title>Smart Livestock Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-weight: 700;
    }

    .dashboard {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 50px;
      gap: 30px;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 30px;
      width: 250px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    .value {
      font-size: 40px;
      font-weight: 700;
      margin-top: 15px;
    }

    .status-normal {
      color: #00ff88;
    }

    .status-warning {
      color: #ffcc00;
    }

    .status-danger {
      color: #ff4d4d;
    }

    footer {
      margin-top: 60px;
      opacity: 0.6;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>🐄 Smart Livestock Monitoring</h1>

  <div class="dashboard">

    <div class="card">
      <h2>🌡 Temperature</h2>
      <div id="temperature" class="value">-- °C</div>
    </div>

    <div class="card">
      <h2>❤️ Health Status</h2>
      <div id="health" class="value">--</div>
    </div>

    <div class="card">
      <h2>🐾 Activity</h2>
      <div id="activity" class="value">--</div>
    </div>

  </div>

  <footer>
    Real-Time IoT Monitoring System | ESP32 + Firebase
  </footer>

  <!-- Firebase SDK -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

 // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAu7nrubc0mqtKsmA22mgLLpQkYAkAEy74",
  authDomain: "livestock-monitoring-sys-ad970.firebaseapp.com",
  databaseURL: "https://livestock-monitoring-sys-ad970-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "livestock-monitoring-sys-ad970",
  storageBucket: "livestock-monitoring-sys-ad970.firebasestorage.app",
  messagingSenderId: "40818009732",
  appId: "1:40818009732:web:593e9d4ff21b3897e944d1",
  measurementId: "G-7FGRGXGPH5"
};

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    const tempRef = ref(database, "livestock/temperature");
    const healthRef = ref(database, "livestock/healthStatus");
    const activityRef = ref(database, "livestock/activity");

    onValue(tempRef, (snapshot) => {
      document.getElementById("temperature").innerText = snapshot.val() + " °C";
    });

    onValue(healthRef, (snapshot) => {
      const health = snapshot.val();
      const healthElement = document.getElementById("health");
      healthElement.innerText = health;

      healthElement.className = "value";

      if (health === "Normal") {
        healthElement.classList.add("status-normal");
      } 
      else if (health === "Low Temperature") {
        healthElement.classList.add("status-warning");
      } 
      else {
        healthElement.classList.add("status-danger");
      }
    });

    onValue(activityRef, (snapshot) => {
      document.getElementById("activity").innerText = snapshot.val();
    });

  </script>

</body>
</html>
