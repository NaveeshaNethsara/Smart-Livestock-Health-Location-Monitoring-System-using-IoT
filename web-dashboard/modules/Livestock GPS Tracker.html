<!DOCTYPE html>
<html>

<head>

<title>Livestock GPS Tracker</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

#map{
height:500px;
width:90%;
margin:auto;
border-radius:10px;
}

.info{
margin:20px;
font-size:20px;
}

</style>

</head>

<body>

<h1>🐄 Livestock GPS Tracker</h1>

<div class="info">
Latitude: <span id="lat">0</span> |
Longitude: <span id="lng">0</span>
</div>

<div id="map"></div>


<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>


<script>

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAu7nrubc0mqtKsmA22mgLLpQkYAkAEy74",
  authDomain: "livestock-monitoring-sys-ad970.firebaseapp.com",
  databaseURL: "https://livestock-monitoring-sys-ad970-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "livestock-monitoring-sys-ad970",
  storageBucket: "livestock-monitoring-sys-ad970.firebasestorage.app",
  messagingSenderId: "40818009732",
  appId: "1:40818009732:web:593e9d4ff21b3897e944d1",
  measurementId: "G-7FGRGXGPH5"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let map;
let marker;

function initMap(){

map = new google.maps.Map(document.getElementById("map"),{

zoom:15,
center:{lat:0,lng:0}

});

marker = new google.maps.Marker({

position:{lat:0,lng:0},
map:map,
icon:"http://maps.google.com/mapfiles/ms/icons/red-dot.png"

});

}


// Listen Firebase

db.ref("livestock/gps").on("value",function(snapshot){

const data = snapshot.val();

const lat = data.latitude;
const lng = data.longitude;

document.getElementById("lat").innerText = lat;
document.getElementById("lng").innerText = lng;

const position = {lat:lat,lng:lng};

marker.setPosition(position);

map.setCenter(position);

});

</script>


<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDGVBIUj2WPWEgh0pJhiiugR-Beleaxc80&callback=initMap">
</script>

</body>

</html>
