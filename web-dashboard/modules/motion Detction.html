<!DOCTYPE html>
<html>
<head>
  <title>Livestock Monitoring Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js"></script>
  
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      text-align: center;
    }

    .card {
      background: white;
      width: 350px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h1 {
      color: #333;
    }

    .value {
      font-size: 22px;
      font-weight: bold;
    }

    #status {
      font-size: 24px;
      padding: 10px;
      border-radius: 8px;
      color: white;
    }
  </style>
</head>

<body>

<h1>🐄 Livestock Monitoring System</h1>

<div class="card">
  <p>X Axis: <span class="value" id="xVal">0</span></p>
  <p>Y Axis: <span class="value" id="yVal">0</span></p>
  <p>Z Axis: <span class="value" id="zVal">0</span></p>
  <p>Movement Level: <span class="value" id="movementVal">0</span></p>
</div>

<div class="card">
  <p>Motion Status:</p>
  <div id="status">Loading...</div>
</div>

<script type="module">

  // 🔥 PASTE YOUR FIREBASE CONFIG HERE
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAu7nrubc0mqtKsmA22mgLLpQkYAkAEy74",
  authDomain: "livestock-monitoring-sys-ad970.firebaseapp.com",
  databaseURL: "https://livestock-monitoring-sys-ad970-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "livestock-monitoring-sys-ad970",
  storageBucket: "livestock-monitoring-sys-ad970.firebasestorage.app",
  messagingSenderId: "40818009732",
  appId: "1:40818009732:web:593e9d4ff21b3897e944d1",
  measurementId: "G-7FGRGXGPH5"
};

  import { initializeApp } 
    from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import { getDatabase, ref, onValue } 
    from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  const xRef = ref(database, '/livestock/accelerometer/x');
  const yRef = ref(database, '/livestock/accelerometer/y');
  const zRef = ref(database, '/livestock/accelerometer/z');
  const movementRef = ref(database, '/livestock/movementLevel');
  const statusRef = ref(database, '/livestock/motionStatus');

  onValue(xRef, (snapshot) => {
    document.getElementById("xVal").innerText = snapshot.val();
  });

  onValue(yRef, (snapshot) => {
    document.getElementById("yVal").innerText = snapshot.val();
  });

  onValue(zRef, (snapshot) => {
    document.getElementById("zVal").innerText = snapshot.val();
  });

  onValue(movementRef, (snapshot) => {
    document.getElementById("movementVal").innerText = snapshot.val();
  });

  onValue(statusRef, (snapshot) => {
    const status = snapshot.val();
    const statusBox = document.getElementById("status");
    statusBox.innerText = status;

    // 🔥 Color Logic
    if (status === "FALL DETECTED") {
      statusBox.style.background = "red";
    }
    else if (status === "Running") {
      statusBox.style.background = "orange";
    }
    else if (status === "Normal Walking") {
      statusBox.style.background = "green";
    }
    else if (status === "Standing Still") {
      statusBox.style.background = "blue";
    }
    else if (status === "Lying Down") {
      statusBox.style.background = "purple";
    }
    else {
      statusBox.style.background = "gray";
    }
  });

</script>

</body>
</html>
