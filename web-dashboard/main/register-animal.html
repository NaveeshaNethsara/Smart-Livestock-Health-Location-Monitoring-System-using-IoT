<!DOCTYPE html>
<html>
<head>
  <title>Register Animal - Smart Livestock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color:white;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 28px;
      background:rgba(0,0,0,0.25);
      backdrop-filter:blur(10px);
    }

    .logo{
      font-size:22px;
      font-weight:700;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .nav button{
      border:none;
      border-radius:10px;
      padding:10px 16px;
      background:rgba(255,255,255,0.12);
      color:white;
      cursor:pointer;
      font-weight:500;
      transition:0.2s;
    }

    .nav button:hover{
      background:rgba(255,255,255,0.2);
      transform:translateY(-1px);
    }

    .container{
      max-width:980px;
      margin:auto;
      padding:30px 20px 40px;
    }

    .page-title{
      text-align:center;
      margin-bottom:8px;
      font-size:32px;
      font-weight:700;
    }

    .subtitle{
      text-align:center;
      opacity:0.8;
      margin-bottom:28px;
    }

    .form-card{
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(14px);
      border-radius:22px;
      padding:28px;
      box-shadow:0 8px 30px rgba(0,0,0,0.3);
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:18px;
    }

    .field{
      display:flex;
      flex-direction:column;
    }

    .field.full{
      grid-column:span 2;
    }

    label{
      margin-bottom:8px;
      font-size:14px;
      font-weight:500;
      opacity:0.95;
    }

    input, select, textarea{
      width:100%;
      padding:13px 14px;
      border:none;
      outline:none;
      border-radius:12px;
      background:rgba(255,255,255,0.14);
      color:white;
      font-family:'Poppins',sans-serif;
      font-size:14px;
    }

    input::placeholder,
    textarea::placeholder{
      color:rgba(255,255,255,0.75);
    }

    select option{
      color:black;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    .hint{
      margin-top:6px;
      font-size:12px;
      opacity:0.75;
    }

    .rfid-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .rfid-row input{
      flex:1;
    }

    .scan-btn{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      background:#ffcc00;
      color:#1c1c1c;
      font-weight:700;
      cursor:pointer;
      transition:0.2s;
    }

    .scan-btn:hover{
      transform:translateY(-1px);
      background:#f1c000;
    }

    .actions{
      display:flex;
      gap:12px;
      justify-content:flex-end;
      flex-wrap:wrap;
      margin-top:24px;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 18px;
      font-family:'Poppins',sans-serif;
      font-weight:600;
      cursor:pointer;
      transition:0.2s;
    }

    .btn-secondary{
      background:rgba(255,255,255,0.14);
      color:white;
    }

    .btn-secondary:hover{
      background:rgba(255,255,255,0.22);
    }

    .btn-primary{
      background:#00c853;
      color:white;
    }

    .btn-primary:hover{
      background:#00b248;
      transform:translateY(-1px);
    }

    .btn-primary:disabled{
      background:#6b7280;
      cursor:not-allowed;
      transform:none;
    }

    .message{
      margin-top:18px;
      padding:12px 14px;
      border-radius:12px;
      display:none;
      font-size:14px;
    }

    .message.success{
      display:block;
      background:rgba(0,200,83,0.18);
      border:1px solid rgba(0,200,83,0.45);
      color:#c8ffd9;
    }

    .message.error{
      display:block;
      background:rgba(255,77,77,0.16);
      border:1px solid rgba(255,77,77,0.4);
      color:#ffd1d1;
    }

    .message.info{
      display:block;
      background:rgba(255,204,0,0.15);
      border:1px solid rgba(255,204,0,0.35);
      color:#fff2bf;
    }

    .footer{
      text-align:center;
      margin-top:28px;
      opacity:0.7;
      font-size:13px;
    }

    @media (max-width: 768px){
      .topbar{
        flex-direction:column;
        gap:12px;
      }

      .form-grid{
        grid-template-columns:1fr;
      }

      .field.full{
        grid-column:span 1;
      }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="logo">🐄 Smart Livestock</div>

    <div class="nav">
      <button onclick="window.location.href='all animal dashboard.html'">Dashboard</button>
      <button onclick="window.location.href='devices.html'">Devices</button>
      <button onclick="window.location.href='register-animal.html'">Register Animal</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="page-title">Register Animal</div>
    <div class="subtitle">Add a new animal and assign a wearable device to the system</div>

    <div class="form-card">
      <form id="animalForm">
        <div class="form-grid">

          <div class="field">
            <label for="animalName">Animal Name</label>
            <input id="animalName" type="text" placeholder="Enter animal name" required>
          </div>

          <div class="field">
            <label for="animalType">Animal Type</label>
            <select id="animalType" required>
              <option value="">Select animal type</option>
              <option value="Cow">Cow</option>
              <option value="Goat">Goat</option>
              <option value="Buffalo">Buffalo</option>
              <option value="Sheep">Sheep</option>
            </select>
          </div>

          <div class="field">
            <label for="breed">Breed</label>
            <input id="breed" type="text" placeholder="Enter breed" required>
          </div>

          <div class="field">
            <label for="gender">Gender</label>
            <select id="gender" required>
              <option value="">Select gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>

          <div class="field">
            <label for="age">Age</label>
            <input id="age" type="number" min="0" placeholder="Enter age" required>
          </div>

          <div class="field">
            <label for="deviceId">Device ID</label>
            <input id="deviceId" type="text" placeholder="Enter device ID (example: DEV001)" required>
          </div>

          <div class="field full">
            <label for="rfid">RFID Tag</label>
            <div class="rfid-row">
              <input id="rfid" type="text" placeholder="Scan or enter RFID tag" required>
              <button type="button" class="scan-btn" onclick="simulateRFID()">Scan RFID</button>
            </div>
            <div class="hint">Tap the wearable RFID tag to detect the assigned collar/device.</div>
          </div>

          <div class="field full">
            <label for="description">Description</label>
            <textarea id="description" placeholder="Enter short animal description"></textarea>
          </div>

          <div class="field full">
            <label for="healthNotes">Health Notes</label>
            <textarea id="healthNotes" placeholder="Add special health notes, medication info, or observations"></textarea>
          </div>

        </div>

        <div class="actions">
          <button type="button" class="btn btn-secondary" onclick="window.location.href='devices.html'">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">Register Animal</button>
        </div>

        <div id="messageBox" class="message"></div>
      </form>
    </div>

    <div class="footer">
      Smart IoT Livestock Monitoring System
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAu7nrubc0mqtKsmA22mgLLpQkYAkAEy74",
      authDomain: "livestock-monitoring-sys-ad970.firebaseapp.com",
      databaseURL: "https://livestock-monitoring-sys-ad970-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "livestock-monitoring-sys-ad970",
      storageBucket: "livestock-monitoring-sys-ad970.firebasestorage.app",
      messagingSenderId: "40818009732",
      appId: "1:40818009732:web:593e9d4ff21b3897e944d1"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.database();

    const form = document.getElementById("animalForm");
    const submitBtn = document.getElementById("submitBtn");
    const messageBox = document.getElementById("messageBox");

    function showMessage(type, text) {
      messageBox.className = "message " + type;
      messageBox.textContent = text;
    }

    function clearMessage() {
      messageBox.className = "message";
      messageBox.textContent = "";
    }

    function normalizeText(value) {
      return value.trim();
    }

    function normalizeUpper(value) {
      return value.trim().toUpperCase();
    }

    function simulateRFID() {
      const rfidInput = document.getElementById("rfid");
      if (rfidInput.value.trim() !== "") {
        showMessage("info", "RFID already entered.");
        return;
      }

      const randomRFID = "RFID" + Math.floor(100000 + Math.random() * 900000);
      rfidInput.value = randomRFID;
      showMessage("success", "RFID scanned successfully: " + randomRFID);
    }

    async function generateAnimalId() {
      const counterRef = db.ref("meta/animalCounter");

      const transactionResult = await counterRef.transaction((currentValue) => {
        return (currentValue || 0) + 1;
      });

      const nextNumber = transactionResult.snapshot.val();
      return "ANM" + String(nextNumber).padStart(3, "0");
    }

    async function isDuplicateDeviceId(deviceId) {
      const snapshot = await db.ref("animals").once("value");
      const animals = snapshot.val();

      if (!animals) return false;

      for (const animalId in animals) {
        const existingDeviceId = animals[animalId]?.profile?.deviceId || "";
        if (existingDeviceId.toUpperCase() === deviceId.toUpperCase()) {
          return true;
        }
      }

      return false;
    }

    async function isDuplicateRFID(rfid) {
      const snapshot = await db.ref("animals").once("value");
      const animals = snapshot.val();

      if (!animals) return false;

      for (const animalId in animals) {
        const existingRFID = animals[animalId]?.profile?.rfid || "";
        if (existingRFID.toUpperCase() === rfid.toUpperCase()) {
          return true;
        }
      }

      return false;
    }

    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = "login.html";
      }
    });

    async function logout() {
      try {
        await auth.signOut();
        window.location.href = "login.html";
      } catch (error) {
        showMessage("error", error.message);
      }
    }

    form.addEventListener("submit", async function(e) {
      e.preventDefault();
      clearMessage();

      const animalName = normalizeText(document.getElementById("animalName").value);
      const animalType = normalizeText(document.getElementById("animalType").value);
      const breed = normalizeText(document.getElementById("breed").value);
      const gender = normalizeText(document.getElementById("gender").value);
      const ageValue = document.getElementById("age").value;
      const age = parseInt(ageValue, 10);
      const deviceId = normalizeUpper(document.getElementById("deviceId").value);
      const rfid = normalizeUpper(document.getElementById("rfid").value);
      const description = normalizeText(document.getElementById("description").value);
      const healthNotes = normalizeText(document.getElementById("healthNotes").value);

      if (!animalName || !animalType || !breed || !gender || ageValue === "" || !deviceId || !rfid) {
        showMessage("error", "Please fill all required fields.");
        return;
      }

      if (Number.isNaN(age) || age < 0) {
        showMessage("error", "Please enter a valid age.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Registering...";

      try {
        const deviceExists = await isDuplicateDeviceId(deviceId);
        if (deviceExists) {
          throw new Error("This Device ID is already assigned to another animal.");
        }

        const rfidExists = await isDuplicateRFID(rfid);
        if (rfidExists) {
          throw new Error("This RFID tag is already assigned to another animal.");
        }

        const animalId = await generateAnimalId();

        const profileData = {
          animalId: animalId,
          name: animalName,
          type: animalType,
          breed: breed,
          gender: gender,
          age: age,
          deviceId: deviceId,
          rfid: rfid,
          description: description,
          healthNotes: healthNotes,
          createdAt: firebase.database.ServerValue.TIMESTAMP
        };

        const liveData = {
          temperature: 0,
          healthStatus: "Pending",
          activity: "Pending",
          gps: {
            latitude: 0,
            longitude: 0
          },
          lastUpdated: 0,
          online: false
        };

        const updates = {};
        updates["animals/" + animalId + "/profile"] = profileData;
        updates["animals/" + animalId + "/live"] = liveData;

        await db.ref().update(updates);

        showMessage("success", "Animal registered successfully. Animal ID: " + animalId);

        form.reset();

        setTimeout(() => {
          window.location.href = "devices.html";
        }, 1200);

      } catch (error) {
        showMessage("error", error.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Register Animal";
      }
    });
  </script>

</body>
</html>
