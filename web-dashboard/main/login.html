<!DOCTYPE html>

<html>
<head>
<title>Livestock Monitoring Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.login-container{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:20px;
padding:40px;
width:320px;
text-align:center;
box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

h2{
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
outline:none;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00b248;
transform:scale(1.03);
}

#error{
color:#ff6b6b;
margin-top:12px;
font-size:14px;
}

.footer{
margin-top:20px;
font-size:12px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="login-container">

<h2>🐄 Livestock Monitoring</h2>

<input id="email" type="email" placeholder="Farmer Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error"></p>

<div class="footer">
Smart IoT Monitoring System
</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAu7nrubc0mqtKsmA22mgLLpQkYAkAEy74",
authDomain: "livestock-monitoring-sys-ad970.firebaseapp.com",
databaseURL: "https://livestock-monitoring-sys-ad970-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "livestock-monitoring-sys-ad970",
storageBucket: "livestock-monitoring-sys-ad970.firebasestorage.app",
messagingSenderId: "40818009732",
appId: "1:40818009732:web:593e9d4ff21b3897e944d1"
};

firebase.initializeApp(firebaseConfig);

function login(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

.then(()=>{

.catch((error)=>{

document.getElementById("error").innerText=error.message;

});

}

</script>
